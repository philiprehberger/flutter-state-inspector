name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened
    validations:
      required: true
  - type: input
    id: dart-version
    attributes:
      label: Flutter version
      description: Output of `flutter --version`
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package version
      description: Version of philiprehberger_state_inspector
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g., macOS 14, Ubuntu 24.04, Windows 11
    validations:
      required: false
